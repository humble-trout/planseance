{% extends "layout.html" %}

{% block title %}Login - {{ config['APP_NAME'] }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/log_reg.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% endblock %}


{% block content %}
<div class="container page">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="container card-container">
                <h1 class="page-title text-center">Bienvenue sur {{ config['APP_NAME'] }}</h1>
                
                <div class="form-wrapper">
                    <h2 class="section-title text-center">Connexion</h2>
                    
                    <form method="POST">
                        <div class="form-group">
                            <label class="form-label">Adresse email</label>
                            <input type="email" name="email" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Mot de passe</label>
                            <input type="password" name="password" class="form-input" required>
                        </div>
                        
                        <div class="form-group text-center">
                            <button type="submit" class="btn-action">
                                Connexion
                            </button>
                        </div>
                    </form>
                    
                    <div class="footer text-center">
                        Pas encore membre ? <a href="{{ url_for('users.register') }}" class="link">Inscrivez-vous!</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
